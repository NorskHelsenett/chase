name: CHASE CI/CD Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      # "**" (not "*") so branches containing a slash (e.g. feat/foo) also
      # trigger — "*" matches only slash-free names like main.
      - "**"
  workflow_dispatch:

jobs:
  # Validate the Helm chart on every branch. build-and-publish only packages
  # the chart on main, so without this a chart-only change would sail through
  # CI untested.
  lint-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install via the official script rather than an action: full-URL action
      # refs (needed by Forgejo) are rejected by GitHub's resolver, and short
      # refs don't resolve on Forgejo. A script works identically on both.
      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Lint and template chart
        run: |
          set -euo pipefail
          # charts/ is gitignored, so fetch subchart deps (cloudnative-pg)
          # before linting/templating.
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm dependency build .helm
          helm lint .helm
          helm template chase .helm > /dev/null

  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Target the registry of whatever git provider this runs under instead
      # of a hard-coded vars.REGISTRY (which is unset on non-GitHub runners and
      # silently falls back to docker.io). github.com -> ghcr.io; anything else
      # (Gitea/Forgejo) -> that server's own host, which doubles as its registry.
      - name: Derive registry host
        run: |
          set -e
          host="${GITHUB_SERVER_URL#https://}"
          host="${host#http://}"
          if [ "$host" = "github.com" ]; then
            echo "REGISTRY_HOST=ghcr.io" >> "$GITHUB_ENV"
          else
            echo "REGISTRY_HOST=$host" >> "$GITHUB_ENV"
          fi
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPOSITORY_LOWER=$repo_lower" >> "$GITHUB_ENV"

      # QEMU disabled: only needed to emulate non-native arch (arm64). All
      # images now build for the runner's native linux/amd64, so the extra
      # emulation setup is unnecessary. Restore this step if arm64 is needed.
      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      # Pick the credential per host: on github.com push to ghcr.io with the
      # REGISTRY_ACCESS_TOKEN PAT (the automatic token isn't authorized on the
      # org package); anywhere else (Forgejo/code.nhn.no) the built-in
      # GITHUB_TOKEN authenticates against that server's own registry.
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ github.server_url == 'https://github.com' && secrets.REGISTRY_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      # Both images build on every push — no dorny/paths-filter change
      # detection, since that action isn't mirrored on Forgejo's registry and
      # 404s there. On main they publish :latest and the chart is pinned and
      # pushed below; on any other branch they publish :dev and the chart is
      # not published. Build cache is registry-backed rather than actions/cache
      # (whose backing service isn't available on the Forgejo runner); both
      # approaches work identically on GitHub and Forgejo.
      # ---------- App image (api + web, root Dockerfile) ----------
      - name: App image metadata
        uses: docker/metadata-action@v4.3.0
        id: meta-app
        with:
          images: ${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}
          tags: |
              type=ref,event=branch
              type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
              type=raw,value=dev,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        id: build-app
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}:buildcache,mode=max

      # ---------- Screenshot service image ----------
      - name: Screenshot image metadata
        uses: docker/metadata-action@v4.3.0
        id: meta-shot
        with:
          images: ${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}/screenshotr
          tags: |
              type=ref,event=branch
              type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
              type=raw,value=dev,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}

      - name: Build and push screenshot image
        uses: docker/build-push-action@v6
        id: build-shot
        with:
          context: screenshot-service
          file: screenshot-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-shot.outputs.tags }}
          labels: ${{ steps.meta-shot.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}/screenshotr:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_HOST }}/${{ env.REPOSITORY_LOWER }}/screenshotr:buildcache,mode=max

      # ---------- Publish Helm chart (main only), pinning BOTH digests ----------
      - name: Install Helm
        if: github.ref == 'refs/heads/main'
        uses: azure/setup-helm@v3

      - name: Pin image digests and publish chart
        if: github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ env.REGISTRY_HOST }}
          APP_BUILT_DIGEST: ${{ steps.build-app.outputs.digest }}
          SHOT_BUILT_DIGEST: ${{ steps.build-shot.outputs.digest }}
          REGISTRY_TOKEN: ${{ github.server_url == 'https://github.com' && secrets.REGISTRY_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Both images are built every run, so pin each at the digest just
          # built (as latest@sha256:...).
          APP_REPO="${REGISTRY}/${REPO_LC}"
          SHOT_REPO="${REGISTRY}/${REPO_LC}/screenshotr"
          APP_TAG="latest@${APP_BUILT_DIGEST}"
          SHOT_TAG="latest@${SHOT_BUILT_DIGEST}"
          echo "Pinning chase=${APP_REPO}:${APP_TAG}  screenshotr=${SHOT_REPO}:${SHOT_TAG}"

          # yq (mikefarah) is preinstalled on ubuntu-latest. Pin repository as
          # well as tag so a build from a mirror (e.g. Forgejo/code.nhn.no)
          # references its own registry instead of the hard-coded ghcr.io in
          # values.yaml. Set each path individually so the pins never collide.
          yq -i ".chase.repository = \"${APP_REPO}\"" .helm/values.yaml
          yq -i ".chase.tag = \"${APP_TAG}\"" .helm/values.yaml
          yq -i ".screenshotr.repository = \"${SHOT_REPO}\"" .helm/values.yaml
          yq -i ".screenshotr.tag = \"${SHOT_TAG}\"" .helm/values.yaml

          # Bump the chart patch version from whatever is currently published.
          helm pull "oci://${REGISTRY}/${REPO_LC}/chase" || true
          file=$(ls chase-*.tgz 2>/dev/null | head -1 || true)
          if [ -n "$file" ]; then
            CURRENT_VERSION=$(echo "$file" | grep -oP 'chase-\K[0-9]+\.[0-9]+\.[0-9]+')
          else
            CURRENT_VERSION=0.0.0
          fi
          NEW_VERSION=$(echo "$CURRENT_VERSION" | awk -F. '{print $1"."$2"."$3+1}')
          echo "Chart version ${CURRENT_VERSION} -> ${NEW_VERSION}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" .helm/Chart.yaml

          echo "$REGISTRY_TOKEN" | helm registry login "${REGISTRY}" -u "${ACTOR}" --password-stdin
          cd .helm
          # charts/ is gitignored, so fetch subchart dependencies (e.g.
          # cloudnative-pg) from Chart.lock before packaging.
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm dependency build .
          helm package .
          helm push chase-*.tgz "oci://${REGISTRY}/${REPO_LC}"
