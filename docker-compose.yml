version: '3.8'

services:
  volume_init:
    image: busybox
    command: chown -R 101:101 /data
    volumes:
      - app_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - screenshot
      - volume_init
    volumes:
      - app_data:/data
    user: "101:101"

  screenshot:
    build:
      context: ./screenshot-service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_RETRIES=3
      - WAIT_TIME=3
    ports:
      - "8081:8080"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app_data: