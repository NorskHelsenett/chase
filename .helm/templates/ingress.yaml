{{- range $key, $value := .Values }}
  {{- with $value.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $key }}-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: avi-ingress-class-helsenett
  tls:
  - hosts:
    - {{ $value.host }}
    secretName: {{ $key }}-tls-secret
  rules:
  - host: {{ $value.host }}
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: chase-service
            port:
              number: 8080
---
{{- end }}
{{- end }}