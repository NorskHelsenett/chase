{{- range $key, $value := .Values }}
{{- if $value.httpRoute }}
{{- with $value.httpRoute }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $key }}-httproute
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  hostnames:
  {{- if .hostnames }}
    {{- toYaml .hostnames | nindent 4 }}
  {{- else }}
    - {{ $value.host }}
  {{- end }}
  {{- if .rules }}
  rules:
    {{- toYaml .rules | nindent 4 }}
  {{- else }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $key }}-service
          port: {{ index $value.services 0 "port" }}
  {{- end }}
{{- end }}
---
{{- end }}
{{- end }}
