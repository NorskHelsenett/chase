{{- range $key, $value := .Values }}
{{- /* Default to enabled, but respect an explicit `enabled: false`.
       `default true $value.enabled` can't: false is the zero value, so it
       always falls back to true and the component can never be disabled. */ -}}
{{- $enabled := true }}
{{- if kindIs "map" $value }}{{- if hasKey $value "enabled" }}{{- $enabled = $value.enabled }}{{- end }}{{- end }}
{{- if and $enabled (eq $value.deployment "deployment") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $key }}
  labels:
    app: {{ $key }}
spec:
  replicas: {{ $value.replicaCount | default 1}}
  selector:
    matchLabels:
      app: {{ $key }}
  template:
    metadata:
      labels:
        app: {{ $key }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups:
          - 100
        fsGroup: {{ $value.runAsUser | default 1001 }}
        runAsNonRoot: true
        runAsUser: {{ $value.runAsUser | default 1001 }}
      containers:
      - name: {{ $key }}
        image: {{ $value.repository }}:{{ $value.tag | default "latest" }}
        resources:
        {{- if $value.resources }}
        {{- toYaml $value.resources | nindent 10 }}
        {{- else }}
          requests:
            memory: "50Mi"   # Request 50 MiB of memory
            cpu: "50m"       # Request 50 millicpu (0.05 CPU cores)
          limits:
            memory: "100Mi"  # Limit to 100 MiB of memory
            cpu: "200m"      # Limit to 200 millicpu (0.2 CPU cores)
          {{- end }}
        imagePullPolicy: {{ $value.pullPolicy }}
        ports:
        {{- range $value.services }}
        - name: {{ .name }}
          containerPort: {{ .port }}
        {{- end }}
        env:
        {{- if and (eq $key "chase") $.Values.chase.auth.generateSecretKey }}
        - name: CHASE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: chase-api-secret
              key: secretKey
        {{- end }}
        {{- if and (eq $key "chase") $.Values.postgres.enabled }}
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: host
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: port
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: dbname
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: password
        - name: PGSSLMODE
          value: "require"
        {{- end }}
        {{- range $value.env }}
        - name: {{ .name }}
          value: "{{ .value }}"
        {{- end }}
        volumeMounts:
        {{- range $value.mounts }}
        - name: {{ .name }}
          mountPath: {{ .mountPath }}
          {{- if .subPath }}
          subPath: {{ .subPath }}
          {{- end }}
          readOnly: {{ .readOnly | default false }}
        {{- end }}
        {{- if $value.livenessProbe }}
        livenessProbe:
          {{- toYaml $value.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if $value.readinessProbe }}
        readinessProbe:
          {{- toYaml $value.readinessProbe | nindent 10 }}
        {{- end }}
        securityContext:
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: {{ $value.runAsUser | default 1001 }}
          runAsGroup: {{ $value.runAsUser | default 1001 }}
          readOnlyRootFilesystem: true
      volumes:
      {{- range $value.mounts }}
      - name: {{ .name }}
        {{- if .fromSecret }}
        secret:
          secretName: {{ .fromSecret }}
        {{- else if .inMemory }}
        emptyDir:
          medium: Memory
          sizeLimit: {{ .storage | default "64Mi" }}
        {{- else if .ephemeral }}
        emptyDir:
          {{- if .storage }}
          sizeLimit: {{ .storage }}
          {{- end }}
        {{- else if .config}}
        configMap:
          name: {{ .name }}
        {{- else }}
        persistentVolumeClaim:
          claimName: {{ $key }}-{{ .name }}-pvc
        {{- end }}
      {{- end }}
---
{{- end }}
{{- end }}
