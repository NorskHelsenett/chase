{{- range $key, $value := .Values }}
{{- $enabled := default true $value.enabled }}
{{- if and $enabled (eq $value.deployment "statefulSet") }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $key }}
  labels:
    app: {{ $key }}
spec:
  serviceName: "{{ $key }}"
  replicas: {{ $value.replicaCount | default 1}}
  selector:
    matchLabels:
      app: {{ $key }}
  template:
    metadata:
      labels:
        app: {{ $key }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 101
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 100
        runAsNonRoot: true
        runAsUser: 101
      containers:
      - name: {{ $key }}
        image: {{ $value.repository }}:{{ $value.tag | default "latest" }}
        resources:
          {{- if $value.resources }}
          {{- toYaml $value.resources | nindent 10 }}
          {{- else }}
          requests:
            memory: "100Mi"  # Request 100 MiB of memory
            cpu: "100m"      # Request 100 millicpu (0.1 CPU cores)
          limits:
            memory: "200Mi"  # Limit to 200 MiB of memory
            cpu: "500m"      # Limit to 500 millicpu (0.5 CPU cores)
          {{- end }}
        imagePullPolicy: {{ $value.pullPolicy }}
        ports:
        {{- range $value.services }}
        - name: {{ .name }}
          containerPort: {{ .port }}
        {{- end }}
        env:
        {{- if $.Values.chase.auth.generateSecretKey }}
        - name: CHASE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: chase-api-secret
              key: secretKey
        {{- end }}
        {{- if and (eq $key "chase") $.Values.postgres.enabled }}
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: host
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: port
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: dbname
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.postgres.name }}-app
              key: password
        - name: PGSSLMODE
          value: "require"
        {{- end }}
        {{- if and (eq $key "chase") $.Values.postgres.migrateFromSQLite.enabled }}
        - name: MIGRATE_FROM_SQLITE
          value: {{ $.Values.postgres.migrateFromSQLite.mountPath | default "/legacy" | quote }}
        {{- end }}
        {{- with $value.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        {{- range $value.mounts }}
        - name: {{ .name }}
          mountPath: {{ .mountPath }}
          readOnly: {{ .readOnly | default false }}
        {{- end }}
        {{- if and (eq $key "chase") $.Values.postgres.migrateFromSQLite.enabled }}
        - name: legacy-sqlite
          mountPath: {{ $.Values.postgres.migrateFromSQLite.mountPath | default "/legacy" }}
          readOnly: true
        {{- end }}
        {{- if $value.livenessProbe }}
        livenessProbe:
          {{- toYaml $value.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if $value.readinessProbe }}
        readinessProbe:
          {{- toYaml $value.readinessProbe | nindent 10 }}
        {{- end }}
        securityContext:
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          runAsGroup: 101
          readOnlyRootFilesystem: true

      {{- if $value.sidecar }}
      {{- if $value.sidecar.enabled }}
      - name: {{ $value.sidecar.name }}
        image: {{ $value.sidecar.repository }}:{{ $value.sidecar.tag }}
        imagePullPolicy: {{ $value.sidecar.pullPolicy }}
        resources:
          {{- toYaml $value.sidecar.resources | nindent 10 }}
        {{- if $value.sidecar.env }}
        env:
        {{- with $value.sidecar.env }}
        {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        volumeMounts:
          {{- range $value.sidecar.mounts }}
          - name: {{ .name }}
            mountPath: {{ .mountPath }}
            readOnly: {{ .readOnly | default false }}
          {{- end }}
        securityContext:
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          runAsGroup: 101
          readOnlyRootFilesystem: true
      {{- end }}
      {{- end }}

      volumes:
      {{- range $value.mounts }}
      {{- if or .fromSecret .inMemory .config }}
      - name: {{ .name }}
        {{- if .fromSecret }}
        secret:
          secretName: {{ .fromSecret }}
        {{- else if .inMemory }}
        emptyDir:
          medium: Memory
          sizeLimit: {{ .storage | default "64Mi" }}
        {{- else if .config }}
        configMap:
          name: {{ .name }}
        {{- end }}
      {{- end }}
      {{- end }}
      {{- if and (eq $key "chase") $.Values.postgres.migrateFromSQLite.enabled }}
      - name: legacy-sqlite
        persistentVolumeClaim:
          claimName: {{ $.Values.postgres.migrateFromSQLite.legacyPVC | required "postgres.migrateFromSQLite.legacyPVC must name the existing SQLite-era PVC" }}
          readOnly: true
      {{- end }}

      {{- if $value.sidecar }}
      {{- if $value.sidecar.enabled }}
      {{- range $value.sidecar.mounts }}
      {{- if .inMemory }}
      - name: {{ .name }}
        emptyDir:
          medium: Memory
          sizeLimit: {{ .storage | default "64Mi" }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- end }}

  volumeClaimTemplates:
  {{- range $value.mounts }}
  {{- if not (or .fromSecret .inMemory .config) }}
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: {{ .name }}
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .storage | default "1Gi" }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
