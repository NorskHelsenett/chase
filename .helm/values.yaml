# Default values for prism.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
chase:
  repository: ghcr.io/norskhelsenett/chase
  pullPolicy: Always
  tag: "latest"
  deployment: statefulSet
  auth:
    generateSecretKey: true
  mounts:
    - name: tmp
      inMemory: true
      mountPath: /tmp
      readOnly: false
      storage: 50Mi
  host: chase.example.com
  # Expose via the Gateway API instead of an Ingress. Presence of this block
  # renders an HTTPRoute (templates/httproute.yaml). parentRefs is required and
  # points at an existing Gateway. hostnames defaults to `host` above; rules
  # default to routing "/" (PathPrefix) to the first service's port.
  # httpRoute:
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-system
  #       sectionName: https
  #   # hostnames:
  #   #   - chase.example.com
  #   # rules:
  #   #   - matches:
  #   #       - path:
  #   #           type: PathPrefix
  #   #           value: /
  #   #     backendRefs:
  #   #       - name: chase-service
  #   #         port: 8080
  env:
    - name: SCREENSHOT_SERVICE_URL
      value: "http://screenshotr-service:8080"
    # Parallel screenshot captures. Keep at or below screenshotr CRAWLER_POOL_SIZE
    # (10 below) — higher just queues inside the service and returns 503s.
    - name: SCREENSHOT_MAX_PARALLEL
      value: "8"
  services:
    - name: http
      port: 8080
  sidecar:
    enabled: false
    name: my-sidecar
    repository: my-sidecar-image
    tag: latest
    pullPolicy: Always
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"

# CloudNativePG operator. Required for the postgresql.cnpg.io/v1 Cluster
# resource below — without it, the Cluster has no controller and the
# deployment hangs waiting for Postgres. Disable if the operator is already
# installed cluster-wide (e.g. by a platform team).
cloudnative-pg:
  install: true
  crds:
    create: true

postgres:
  enabled: true
  name: chase-postgres
  database: chase
  owner: chase
  instances: 1
  image: ghcr.io/cloudnative-pg/postgresql:17
  storageSize: 10Gi
  # storageClass: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  parameters:
    max_connections: "100"
    shared_buffers: "128MB"
  # One-shot atomic import from a legacy SQLite chase.db. Mounts an existing
  # PVC read-only into the chase pod and points MIGRATE_FROM_SQLITE at it.
  # Idempotent: the binary marks completion in data_migrations and skips on
  # subsequent boots, so leaving this enabled is safe across rollouts.
  migrateFromSQLite:
    enabled: true
    legacyPVC: data-chase-0
    # The legacy PVC is mounted read-only here; chase auto-detects any *.db
    # file inside (preferring chase.db / fit.db).
    mountPath: /legacy

screenshotr:
  repository: ghcr.io/norskhelsenett/chase/screenshotr
  pullPolicy: Always
  deployment: deployment
  replicaCount: 1
  # Overwritten with "latest@sha256:..." by CI on main (see docker-image.yml).
  tag: "latest"
  env:
    - name: PORT
      value: "8080"
    - name: CHROME_BIN
      value: "/usr/bin/chromium-browser"
    - name: CHROME_PATH
      value: "/usr/lib/chromium/"
    - name: CRAWLER_POOL_SIZE
      value: "10"
    - name: CRAWL_TIMEOUT
      value: '7'
  resources:
    requests:
      memory: "128Mi" # Request 512 MiB of memory
      cpu: "250m" # Request 0.25 CPU cores
    limits:
      memory: "2048Mi" # Limit to 2 GiB of memory
      cpu: "5000m" # Limit to 5 CPU cores
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    periodSeconds: 30
  services:
    - name: web
      port: 8080
  mounts:
  - name: dshm
    inMemory: true
    mountPath: /dev/shm
    readOnly: false
    storage: 256Mi
  # Disk-backed, not in-memory: Chrome is launched with --disable-dev-shm-usage,
  # so its shared-memory files plus go-rod's per-browser user-data dirs all land
  # in /tmp. Keeping that on node disk (not RAM) means a burst of concurrent
  # captures can't exhaust a tiny tmpfs or eat into the pod's memory limit.
  - name: tmp
    ephemeral: true
    mountPath: /tmp
    readOnly: false
    storage: 2Gi

certstream:
  enabled: false
  repository: 0rickyy0/certstream-server-go
  pullPolicy: IfNotPresent
  deployment: deployment
  replicaCount: 1
  tag: v1.8.2@sha256:5ba5a2f54901b0c4794fb460e454a56e05a1bca37d34934369f83be69fee43d7
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  services:
    - name: http
      port: 8080
    - name: metrics
      port: 8081
  livenessProbe:
    httpGet:
      path: /domains-only/example.json
      port: 8080
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /domains-only/example.json
      port: 8080
    periodSeconds: 30
  env:
    - name: CONFIG_FILE
      value: "/app/config.yaml"
  mounts:
    - name: certstream-config
      mountPath: /app/config.yaml
      subPath: config.yaml
      readOnly: true
      config:
        fileName: config.yaml
        data: |-
          webserver:
            listen_addr: "0.0.0.0"
            listen_port: 8080
            real_ip: false
            full_url: "/full-stream"
            lite_url: "/"
            domains_only_url: "/domains-only"
            cert_path: ""
            cert_key_path: ""
            compression_enabled: false
          prometheus:
            enabled: false
            listen_addr: "0.0.0.0"
            listen_port: 8081
            metrics_url: "/metrics"
            expose_system_metrics: false
            real_ip: false
            whitelist:
              - "127.0.0.1/8"
          general:
            disable_default_logs: false
            additional_logs:
              - url: https://ct.googleapis.com/logs/us1/mirrors/digicert_nessie2022
                operator: "DigiCert"
                description: "DigiCert Nessie2022 log"
            buffer_sizes:
              websocket: 300
              ctlog: 1000
              broadcastmanager: 10000
            drop_old_logs: true
            recovery:
              enabled: true
              ct_index_file: "/data/ct_index.json"
    # Node-ephemeral, not a PVC: /data only holds certstream's CT-log resume
    # index (ct_index.json). Losing it on restart just resumes from current —
    # not worth a PVC that can deadlock on pruning or strand the pod.
    - name: certstream-data
      ephemeral: true
      mountPath: /data
      readOnly: false
      storage: 1Gi
