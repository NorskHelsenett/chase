# Default values for prism.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
chase:
  repository: ghcr.io/norskhelsenett/chase
  pullPolicy: Always
  tag: "latest"
  deployment: statefulSet
  auth:
    generateSecretKey: true
  mounts:
  - name: data
    mountPath: /data
    readOnly: false
    storage: 10Gi
    statefulSet: true
  - name: tmp
    inMemory: true
    mountPath: /tmp
    readOnly: false
    storage: 50Mi
  host: chase.example.com
  env:
  - name: DATA_FOLDER
    value: "/data"
  - name: SCREENSHOT_SERVICE_URL
    value: "http://screenshotr-service:8080"
  services:
  - name: http
    port: 8080
  sidecar:
    enabled: false
    name: my-sidecar
    repository: my-sidecar-image
    tag: latest
    pullPolicy: Always
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"

screenshotr:
  repository: ghcr.io/norskhelsenett/chase/screenshotr
  pullPolicy: Always
  deployment: deployment
  replicaCount: 1
  tag: ""
  resources:
    requests:
      memory: "128Mi"    # Request 512 MiB of memory
      cpu: "250m"        # Request 0.25 CPU cores
    limits:
      memory: "2048Mi"   # Limit to 1 GiB of memory
      cpu: "500m"        # Limit to 0.5 CPU cores
  services:
  - name: web
    port: 8080
  - name: geckodriver
    port: 4444
  env:
  - name: MOZ_HEADLESS
    value: "1"
  - name: FIREFOX_BIN
    value: "/usr/lib/firefox-esr/firefox-esr"
  - name: MOZ_DISABLE_CONTENT_SANDBOX
    value: "1"
  - name: GECKO_DRIVER_PORT
    value: "4444"
  - name: GECKO_DRIVER_HOST
    value: "127.0.0.1"
  mounts:
  - name: dshm
    inMemory: true
    mountPath: /dev/shm
    readOnly: false
    storage: 1Gi
  - name: tmp
    inMemory: true
    mountPath: /tmp
    readOnly: false
    storage: 50Mi
  - name: home
    inMemory: true
    mountPath: /home
    readOnly: false
    storage: 50Mi
  - name: screenshots
    inMemory: true
    mountPath: /app/screenshots
    readOnly: false
    storage: 50Mi

certstream:
  enabled: false
  repository: 0rickyy0/certstream-server-go
  pullPolicy: Always
  deployment: deployment
  replicaCount: 1
  tag: latest
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  services:
  - name: http
    port: 8080
  - name: metrics
    port: 8081
  livenessProbe:
    httpGet:
      path: /metrics
      port: 8081
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /metrics
      port: 8081
    periodSeconds: 30
  env:
  - name: CONFIG_FILE
    value: "/app/config.yaml"
  mounts:
  - name: certstream-config
    mountPath: /app/config.yaml
    subPath: config.yaml
    readOnly: true
    config:
      fileName: config.yaml
      data: |-
        webserver:
          listen_addr: "0.0.0.0"
          listen_port: 8080
          real_ip: false
          full_url: "/full-stream"
          lite_url: "/"
          domains_only_url: "/domains-only"
          cert_path: ""
          cert_key_path: ""
          compression_enabled: false
        prometheus:
          enabled: false
          listen_addr: "0.0.0.0"
          listen_port: 8081
          metrics_url: "/metrics"
          expose_system_metrics: false
          real_ip: false
          whitelist:
            - "127.0.0.1/8"
        general:
          disable_default_logs: false
          additional_logs:
            - url: https://ct.googleapis.com/logs/us1/mirrors/digicert_nessie2022
              operator: "DigiCert"
              description: "DigiCert Nessie2022 log"
          buffer_sizes:
            websocket: 300
            ctlog: 1000
            broadcastmanager: 10000
          drop_old_logs: true
          recovery:
            enabled: true
            ct_index_file: "/data/ct_index.json"
  - name: certstream-data
    mountPath: /data
    readOnly: false
    storage: 1Gi
